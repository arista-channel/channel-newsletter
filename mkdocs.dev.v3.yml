# Local preview config — "Hybrid" staging variant v3 of 2026.2.
# Article 1: v2 author original + v1 Partner Opportunities.
# Article 2: v2 authors' original. Articles 3-4 and the rest: v1 rewritten.
# Serve via: mkdocs serve -f mkdocs.dev.v3.yml -a 127.0.0.1:8003
site_name: Engineers' Exchange
site_url: https://arista-channel.github.io/channel-newsletter/
site_description: Engineers sharing with engineers - Quarterly technical newsletter for Arista channel partners
site_author: Miguel Balagot

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

docs_dir: content/2026.2-v3

nav:
  - Home: index.md
  - Current Issue: current-issue.md
  - Archive: archive.md
  - About: about.md

markdown_extensions:
  - attr_list
  - md_in_html

plugins:
  - search
  - minify:
      minify_html: true

extra:
  version:
    provider: mike
    default: latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/arista-channel/channel-newsletter
    - icon: fontawesome/solid/envelope
      link: mailto:mbalagot@arista.com

copyright: Copyright &copy; 2024-2026 Arista Networks. All rights reserved.
