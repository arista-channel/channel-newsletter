# Local preview config — "Concise + Article References" staging variant v4 of 2026.2.
# Home: v1 rewritten summaries (no author names). Article References: pure author originals.
# Navigation uses a burger menu (drawer) on all screen sizes.
# Serve via: ./scripts/serve-v4.sh
# Or manually: .venv/bin/mkdocs serve -f mkdocs.dev.v4.yml -a 127.0.0.1:8004
site_name: Engineers' Exchange
site_url: https://arista-channel.github.io/channel-newsletter/
site_description: Engineers sharing with engineers - Quarterly technical newsletter for Arista channel partners
site_author: Miguel Balagot

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow

docs_dir: content/2026.2-v4

nav:
  - Home: index.md
  - Article References:
    - DANZ Monitoring Fabric: article-references/dmf.md
    - IP Broadcast: article-references/ip-broadcast.md
    - CloudVision: article-references/cloudvision.md
    - AI Fabrics: article-references/ai-fabrics.md
  - Current Issue: current-issue.md
  - Archive: archive.md
  - About: about.md

extra_css:
  - stylesheets/burger-nav.css

markdown_extensions:
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search
  - minify:
      minify_html: true

extra:
  version:
    provider: mike
    default: latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/arista-channel/channel-newsletter
    - icon: fontawesome/solid/envelope
      link: mailto:mbalagot@arista.com

copyright: Copyright &copy; 2024-2026 Arista Networks. All rights reserved.
